name: CI/CD Frontend

# Se ejecuta en cada push a main y también de forma manual
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: eval2-frontend
  ECS_CLUSTER: eval2-cluster
  ECS_SERVICE: eval2-service

jobs:
  build-test-deploy:
    runs-on: self-hosted
    steps:
      # ---------- 1. Checkout ----------
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      # ---------- 2. Test ----------
      # Se prueba dentro de un contenedor python:3.12-slim (misma versión que la imagen
      # final) para no depender del Python del runner self-hosted.
      - name: Instalar dependencias y validar la importación de la app
        run: |
          docker run --rm -v "$PWD":/app -w /app python:3.12-slim \
            sh -c "pip install --no-cache-dir -r requirements.txt && python -c 'import app; print(\"Frontend import OK\")'"

      # ---------- 3. Credenciales AWS (GitHub Secrets) ----------
      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      # ---------- 4. Build + Push a Amazon ECR ----------
      - name: Iniciar sesión en Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Construir, etiquetar y publicar imagen en ECR
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:latest \
                       -t $REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
          docker push $REGISTRY/$ECR_REPOSITORY:latest
          docker push $REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

      # ---------- 5. Deploy automatizado en ECS ----------
      - name: Desplegar nueva versión en ECS Fargate
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment
          echo "Despliegue disparado. Esperando estabilización del servicio..."
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE
