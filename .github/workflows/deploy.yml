name: CI/CD Frontend -> Docker Hub -> EC2

on:
  push:
    branches: [deploy]
  workflow_dispatch:

jobs:
  build-push-deploy:
    runs-on: [self-hosted, front]
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build imagen frontend
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/front-eval2:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/front-eval2:${{ github.sha }} \
            .

      - name: Push a Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/front-eval2:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/front-eval2:${{ github.sha }}

      - name: Deploy en EC2-Frontend via SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > /tmp/eval2-key.pem
          chmod 600 /tmp/eval2-key.pem
          scp -i /tmp/eval2-key.pem -o StrictHostKeyChecking=no docker-compose.yml ${EC2_USER}@${EC2_HOST}:~/app/docker-compose.yml
          ssh -i /tmp/eval2-key.pem -o StrictHostKeyChecking=no ${EC2_USER}@${EC2_HOST} '
            cd ~/app
            docker compose pull
            docker compose up -d
            docker image prune -f
            docker ps
          '
          rm -f /tmp/eval2-key.pem
